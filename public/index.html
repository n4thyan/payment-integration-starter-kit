<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Payment Widget Demo</title>
    <meta name="description" content="Embeddable Stripe and PayPal payment widget for small web projects.">
    <link rel="stylesheet" href="/styles.css">
  </head>
  <body>
    <main class="demo-shell">
      <section class="demo-copy" aria-labelledby="demo-title">
        <p class="demo-kicker">Reusable payment component</p>
        <h1 id="demo-title">Payment widget starter kit</h1>
        <p class="demo-lead">A small payment widget that can sit inside another page instead of taking over the whole layout.</p>
      </section>

      <section class="demo-preview" aria-label="Payment widget preview">
        <div class="merchant-panel">
          <div class="merchant-header">
            <span>Example service page</span>
            <strong>Starter Website Deposit</strong>
          </div>

          <div id="payment-widget"></div>
        </div>
      </section>
    </main>

    <script src="/payment-widget.js"></script>
    <script src="/app.js"></script>
  </body>
</html>
